<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treehut Map Viewer</title>
    <style>
      html {
        align-items: center;
        background: url("grass.jpg") center / 256px repeat;
        display: flex;
        font-family: "Tahoma", "Arial", sans-serif;
        font-size: 0.8rem;
        justify-content: center;
      }

      body {
        background-color: white;
        display: flex;
        flex-direction: column;
        height: calc(100vh - 80px);
        margin: 0 auto;
        padding: 40px;
        width: 640px;
      }

      h1 {
        margin-top: 0px;
      }

      #gci {
        display: block;
        padding: 10px 0px;
      }

      #fileError {
        color: red;
      }

      #main {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <h1>Treehut Map Viewer</h1>
      <form id="upload">
        <label for="gci">Upload your <i>Animal Crossing</i> (USA) save file in ".gci" format.<br />
          Your file is never uploaded to a server; contents are only stored in your browser's memory.
        </label>
        <input type="file" id="gci" name="gci" accept=".gci">
      </form>
      <span id="fileError"></span><br />
    </div>
    <div id="credits">
      Credit to the <a href="https://github.com/ACreTeam">ACreTeam</a> for their work on the 
      <a href="https://github.com/ACreTeam/ac-decomp">ac-decomp</a> project which was used as a 
      reference for this project.<br />
      Additionally, credit to <a href="https://www.deviantart.com/thenewhylton/art/Animal-Crossing-Grass-Remake-Spring-HD-439882381">thenewhylton</a>
      for the background texture image.
    </div>

    <script>
      const correctFileName = "01-GAFE-DobutsunomoriP_MURA.gci";
      const fileError = document.getElementById("fileError");
      const gci = document.getElementById("gci");
      const hex = document.getElementById("hex");
      const uploadForm = document.getElementById("upload").reset();
      let uploads;
      let uploadedFile;

      gci.addEventListener("change", (event) => {
        uploads = event.target.files;

        if (uploads.length > 0) {
          uploadedFile = uploads[0];

          if (uploadedFile.name != correctFileName) {
            fileError.innerText = `Please make sure to upload ${correctFileName}`;
          }
          else {
            fileError.innerText = "";
            getFileContents();
          }
        }
      });

      function getFileContents() {
        const reader = new FileReader();
        reader.readAsArrayBuffer(uploadedFile);

        reader.addEventListener("load", (event) => {
          const buffer = event.target.result;
          const array = new Uint8Array(buffer);

          const start = parseInt("0003D3E8", 16);
          const end = parseInt("0003D473", 16);

          const slicedData = array.slice(start, end + 1);
        });
      }
    </script>
  </body>
</html>
