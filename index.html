<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Crossing Tree Growth Map</title>
    <link rel="icon" type="image/png" href="tree.png">
    <style>
      html {
        align-items: center;
        background: url("grass.jpg") center / 16rem repeat;
        display: flex;
        font-family: "Tahoma", "Arial", sans-serif;
        font-size: 0.8rem;
        height: 100vh;
        justify-content: center;
      }

      a {
        color: blue;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      body {
        background-color: white;
        display: flex;
        flex-direction: column;
        height: calc(100vh - 15rem);
        margin: 0 auto;
        padding: 4rem;
        width: 50rem;
      }

      h1 {
        margin-top: 0;
      }

      ul, ol {
        list-style-position: inside;
        list-style-type: square;
        padding-left: 0;
      }

      #gci {
        display: block;
        padding: 1rem 0;
      }

      #fileError {
        color: red;
      }

      #main {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <h1>Animal Crossing Tree Growth Map</h1>
      <form id="upload">
        <label for="gci">Upload your <i>Animal Crossing</i> (USA) save file in ".gci" format.<br />
          Your file is never uploaded to a server; contents are only stored in your browser's memory.
        </label>
        <input type="file" id="gci" name="gci" accept=".gci">
      </form>
      <span id="fileError"></span><br />
    </div>
    <div id="credits">
      <h2>Credits</h2>
      <ul>
        <li>
          <a href="https://github.com/ACreTeam">ACreTeam</a> for their work on the 
          <a href="https://github.com/ACreTeam/ac-decomp">ac-decomp</a> project which was used as a 
          reference for this project.
        </li>
        <li>
          <a href="https://www.deviantart.com/thenewhylton/art/Animal-Crossing-Grass-Remake-Spring-HD-439882381">thenewhylton</a>
          for the background texture image.
        </li>
        <li>
          <a href="https://nookipedia.com/wiki/Item:Tree_model_(Animal_Crossing)#/media/File:Tree_Model_PG_Model.png">Nookipedia</a>
          for the tree icon based on the <a href="https://nookipedia.com/wiki/Item:Tree_model_(Animal_Crossing)">tree model</a>.
        </li>
      </ul>
      Licensed under <a href="LICENSE">GNU GLPv3.</a> Made by <a href="https://github.com/StripesFensky">Stripes</a>.
    </div>

    <script>
      const fileError = document.getElementById("fileError");
      const gci = document.getElementById("gci");
      const hex = document.getElementById("hex");
      const uploadForm = document.getElementById("upload").reset();
      let uploads;
      let uploadedFile;

      gci.addEventListener("change", (event) => {
        const reader = new FileReader();
        uploads = event.target.files;
        uploadedFile = uploads[0]

        reader.readAsArrayBuffer(uploadedFile);

        reader.addEventListener("load", (event) => {
          const fileBuffer = event.target.result;
          const fileArray = new Uint8Array(fileBuffer);

          const gafStart = parseInt("00000000", 16);
          const gafEnd = parseInt("00000005", 16);

          let gafStr = getHexString(fileArray, "00000000", "00000005");
          console.log(gafStr);

          let muraStr = getHexString(fileArray, "00000008", "0000001A");
          console.log(muraStr);
        });
      });

      function getHexString(array, startHex, endHex) {
        const start = parseInt(startHex, 16);
        const end = parseInt(endHex, 16);
        const sliced = array.slice(start, end + 1);
        let valueStr = "";

        for (let i = 0; i < sliced.length; i++) {
          const intChar = parseInt(sliced[i].toString(16), 16);
          const strChar = String.fromCharCode(intChar);
          valueStr += strChar;
        }
        
        return valueStr;
      }
    </script>
  </body>
</html>
